<!DOCTYPE html>
<html lang=ja dir="ltr">
<head>
  <meta charset="utf-8">
  <title>大会概要ページ</title>
 <link rel="stylesheet" type="text/css" href="../../static/css/OverViewStyle.css" th:href="@{/css/OverViewStyle.css}"> 
</head>
<body>

<header>
  <div class="header-container">
    <div class="left-container">
      <img src=cat_logo.png  class="header-item" width="90px" height="60px">
      <div class="header-item">
        <input type="search" name="search" placeholder="大会を検索">
        <input type="submit" name="submit" id="search_button" value="検索">
      </div>
    </div>
    <div class="right-container">
      <div class="header-item">user icon</div>
      <div class="header-item">user name</div>
      </div>
  </div>

</header>
<form th:action="@{/comp/create}" th:object="${compForm}" method="post">
  <main>
    <table>
    <div id="input-container">
      <p>大会名　  :<input readonly type="text" class="input-item" name="comp_name" th:field="*{comp_name}" input value="大会名表示"> </p> 
      
      <p>ゲーム名　:<input readonly type="text" class="input-item" name="game_name" th:field="*{game_name}" input value="ゲーム名表示"> </p> 
      <!-- <textarea readonly class="textlines">test</textarea> !-->
      <p>開始日時　:<input readonly type="datetime-local" class="input-item" name="start_date" th:field="*{start_date}"></p>
      <p>終了日時　:<input readonly type="datetime-local" class="input-item" name="end_date" th:field="*{end_date}"></p>
      <p>参加者上限:<input readonly type="number"  class="input-item" name="limit_of_participants" th:field="*{limit_of_participants}" input value="999"></p>
      <div id="description-container">
        <p>概要　  :</p>
        <textarea readonly class="input-item-ta" name="description" cols="30" rows="5" style="resize: none">ここに概要を表示</textarea>
      </div>
      <p>締め切り　:<input readonly type="datetime-local" class="input-item" name="deadline" th:field="*{deadline}"></p>
    </div>
    </div>
    </div>
  </table>
  <table>
    <textarea readonly class="input-item-ta-chat" name="description" cols="30" rows="5" style="resize: none">ここにチャットを表示</textarea>
    <p><input type="text" class="input-item-chat" name="text_input" th:field="*{text_input}" input value="チャット入力欄">
      <input type="button" class="button-item-chat" onclick="alert('送信')" value="送信"></p>
  </table>
    <tr><td>主催者ID:</td><td><input type="text" name="host_user_id" th:field="*{host_user_id}" th:errorclass="error-input" />
      <span th:if="${#fields.hasErrors('host_user_id')}" th:errors="*{host_user_id}" class="error-messages">error!</span>
      </td></tr>
    <div id="button-container">
      <input type="button" class="button-item" onclick="alert('戻る')" value="戻る">
      <input type="button" class="button-item-par" onclick="alert('参加')" value="参加する">
    </div>
  </main>
</form>
<footer>
  <div id="temp-footer">©Competition Assistance Tool</div>
</footer>

</body>
</html>
